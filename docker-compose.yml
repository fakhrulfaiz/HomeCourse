services:

  # ── Backend API (hot-reload via nodemon) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vlearn-backend
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=file:/data/app.db
      - VIDEO_DIRS=/videos
      - NODE_ENV=development
      - AUTH_DISABLED=true
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      # SQLite database
      - sqlite_data:/data
      # Video library (read-only)
      - "E:\\Learning Videos:/videos:ro"
    networks:
      - vlearn-network
    restart: unless-stopped

  # ── Frontend (Vite dev server with HMR) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vlearn-frontend
    env_file:
      - ./.env
    environment:
      # Tells vite.config.ts where to proxy /api calls
      - BACKEND_URL=http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - vlearn-network
    restart: unless-stopped

volumes:
  sqlite_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  vlearn-network:
    driver: bridge
