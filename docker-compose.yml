version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vlearn-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - vlearn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vlearn-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vlearn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vlearn-backend
    env_file:
      - ./.env
    environment:
      # Override DATABASE_URL to use Docker network (postgres:5432 instead of localhost:5433)
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      # Override VIDEOS_BASE_PATH to use mounted volume
      - VIDEOS_BASE_PATH=/videos
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot-reloading
      - ./backend:/app
      # Use named volume for node_modules (better performance on Windows)
      - backend_node_modules:/app/node_modules
      # Mount videos directory (read-only)
      - E:\Learning Videos:/videos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vlearn-network
    restart: unless-stopped

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vlearn-frontend
    env_file:
      - ./.env
    volumes:
      # Mount source code for hot-reloading
      - ./frontend:/app
      # Use named volume for node_modules (better performance on Windows)
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - vlearn-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vlearn-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vlearn-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  vlearn-network:
    driver: bridge
